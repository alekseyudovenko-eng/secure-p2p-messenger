<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>P2P Secure Call</title>
  <!-- PeerJS для WebRTC -->
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <!-- Firebase для реального времени -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root { --bg:#0b0b0b; --panel:#141414; --border:#2a2a2a; --text:#e6e6e6; --accent:#ffffff; --danger:#cf6679; --success:#4caf50; --muted:#888; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:'Inter',system-ui,-apple-system,sans-serif; }
    body { background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
    
    /* Вход */
    #reg { position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center; }
    .reg-box { background:var(--panel); padding:32px; border-radius:12px; border:1px solid var(--border); width:88%; max-width:300px; text-align:center; }
    .reg-box h1 { font-size:20px; font-weight:500; margin-bottom:24px; color:var(--accent); letter-spacing:0.5px; }
    .input { width:100%; padding:14px; background:#1a1a1a; border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:15px; outline:none; margin-bottom:12px; transition:0.2s; }
    .input:focus { border-color:#444; }
    .btn { width:100%; padding:14px; background:var(--accent); color:#000; border:none; border-radius:6px; font-weight:600; cursor:pointer; transition:0.15s; }
    .btn:hover { opacity:0.9; } .btn:active { transform:scale(0.98); }
    .err { color:var(--danger); font-size:13px; margin-top:8px; min-height:18px; }

    /* Интерфейс */
    #app { display:none; height:100%; position:relative; }
    .vid { position:absolute; inset:0; background:#000; }
    #remote { width:100%; height:100%; object-fit:cover; }
    #local { position:absolute; bottom:100px; right:16px; width:140px; aspect-ratio:16/9; object-fit:cover; border:1px solid #333; border-radius:8px; background:#111; box-shadow:0 6px 16px rgba(0,0,0,0.6); transform:scaleX(-1); }
    
    .status { position:absolute; top:16px; left:16px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:20px; font-size:13px; display:flex; align-items:center; gap:6px; backdrop-filter:blur(4px); }
    .dot { width:6px; height:6px; border-radius:50%; background:#555; transition:0.2s; } .dot.on { background:var(--success); box-shadow:0 0 6px var(--success); }
    .myid { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.1); padding:6px 12px; border-radius:20px; font-size:13px; cursor:pointer; user-select:none; }
    
    /* Управление */
    .ctrl { position:absolute; bottom:0; left:0; width:100%; height:85px; background:linear-gradient(transparent, #000); display:flex; justify-content:center; align-items:center; gap:24px; }
    .cbtn { width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.12); border:none; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:0.2s; }
    .cbtn:hover { background:rgba(255,255,255,0.2); } .cbtn.on { background:#fff; color:#000; } .cbtn.off { background:var(--danger); }
    
    /* Кнопка вызова */
    .fab { position:absolute; bottom:110px; left:50%; transform:translateX(-50%); width:60px; height:60px; border-radius:50%; background:var(--success); color:#000; border:none; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(76,175,80,0.4); transition:0.2s; }
    .fab.end { background:var(--danger); box-shadow:0 6px 16px rgba(207,102,121,0.4); }
    
    /* Меню онлайн */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:50; display:none; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
    .mbox { background:var(--panel); width:90%; max-width:280px; border-radius:12px; border:1px solid var(--border); overflow:hidden; max-height:80vh; display:flex; flex-direction:column; }
    .mhead { padding:16px; border-bottom:1px solid var(--border); font-weight:500; display:flex; justify-content:space-between; font-size:15px; }
    .ulist { flex:1; overflow-y:auto; padding:8px 0; }
    .uitem { padding:12px 16px; border-bottom:1px solid #1f1f1f; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:0.1s; font-size:14px; }
    .uitem:hover { background:#1a1a1a; }
    .uinput { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; }
    .uinput input { flex:1; margin:0; background:#1a1a1a; border:1px solid #333; color:var(--text); border-radius:6px; padding:10px; outline:none; font-size:14px; }
    .uinput button { width:40px; background:#333; color:var(--text); border:none; border-radius:6px; cursor:pointer; }
    .empty { padding:24px; text-align:center; color:var(--muted); font-size:13px; }

    /* Чат */
    .chat-panel { position:absolute; top:0; right:-320px; width:320px; height:100%; background:var(--panel); border-left:1px solid var(--border); transition:0.3s; display:flex; flex-direction:column; }
    .chat-panel.open { right:0; }
    .chat-head { padding:16px; border-bottom:1px solid var(--border); font-weight:500; display:flex; justify-content:space-between; align-items:center; }
    .chat-msgs { flex:1; padding:16px; overflow-y:auto; font-size:14px; display:flex; flex-direction:column; gap:8px; }
    .msg { padding:8px 12px; border-radius:6px; max-width:85%; word-wrap:break-word; }
    .msg.sent { background:#222; margin-left:auto; }
    .msg.recv { background:#1a1a1a; }
    .chat-in { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
    .chat-in input { flex:1; margin:0; background:#1a1a1a; border:1px solid #333; color:var(--text); border-radius:6px; padding:10px; outline:none; }
    .chat-in button { width:40px; background:#333; color:var(--text); border:none; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>

  <!-- ВХОД -->
  <div id="reg">
    <div class="reg-box">
      <h1>Личный ID</h1>
      <input class="input" id="uid" placeholder="Только a-z и 0-9 (мин. 3)" maxlength="12" autocomplete="off">
      <button class="btn" onclick="login()">ВОЙТИ В СЕТЬ</button>
      <div class="err" id="err"></div>
    </div>
  </div>

  <!-- ПРИЛОЖЕНИЕ -->
  <div id="app">
    <div class="vid">
      <video id="remote" autoplay playsinline muted></video>
      <video id="local" autoplay muted playsinline></video>
    </div>
    <div class="status"><div class="dot" id="dot"></div><span id="st">Подключение...</span></div>
    <div class="myid" id="myid" onclick="copyId()">ID: ---</div>
    
    <button class="fab" id="fab" onclick="openMenu()"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg></button>
    
    <div class="ctrl">
      <button class="cbtn on" id="mic" onclick="toggle('mic')" title="Микрофон"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
      <button class="cbtn on" id="cam" onclick="toggle('cam')" title="Камера"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></button>
      <button class="cbtn" id="screen" onclick="toggleScreen()" title="Демонстрация экрана"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg></button>
      <button class="cbtn" id="hang" onclick="hangup()" style="display:none" title="Завершить"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.956.956 0 01-.29-.71c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg></button>
      <button class="cbtn" id="chatBtn" onclick="toggleChat()" title="Чат"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
    </div>

    <!-- Меню контактов -->
    <div class="modal" id="menu" onclick="if(event.target===this)closeMenu()">
      <div class="mbox">
        <div class="mhead">Онлайн-пользователи <span onclick="closeMenu()" style="cursor:pointer">✕</span></div>
        <div class="ulist" id="ulist"><div class="empty">Загрузка списка...</div></div>
        <div class="uinput">
          <input id="cid" placeholder="Ввести ID вручную">
          <button onclick="callDirect()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg></button>
        </div>
      </div>
    </div>

    <!-- Чат -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-head">Сообщения <span onclick="toggleChat()" style="cursor:pointer">✕</span></div>
      <div class="chat-msgs" id="msgs"><div class="empty" style="padding:40px 0">Чат доступен во время звонка</div></div>
      <div class="chat-in"><input type="text" id="chatInput" placeholder="Сообщение..." disabled onkeydown="if(event.key==='Enter')sendMsg()"><button onclick="sendMsg()">➤</button></div>
    </div>
  </div>

  <script>
    // 🔑 ВСТАВЬТЕ СЮДА ВАШИ КЛЮЧИ FIREBASE (БЕСПЛАТНО)
    const firebaseConfig = {
      apiKey: "ВАШ_API_KEY",
      authDomain: "ВАШ_PROJECT.firebaseapp.com",
      databaseURL: "https://ВАШ_PROJECT-default-rtdb.firebaseio.com",
      projectId: "ВАШ_PROJECT",
      storageBucket: "ВАШ_PROJECT.appspot.com",
      messagingSenderId: "ВАШ_SENDER",
      appId: "ВАШ_APP_ID"
    };

    // Инициализация (если конфиг не заполнен, Firebase не запустится, но приложение будет работать через ручной ввод)
    let db;
    try {
      if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "ВАШ_API_KEY") {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
      }
    } catch(e) { console.warn("Firebase не настроен. Будет работать ручной ввод ID."); }

    let peer, call, stream, myId, dataConn;
    let onlineUsers = {};
    const $ = id => document.getElementById(id);

    // Вход
    function login() {
      const id = $('uid').value.trim().replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
      if (id.length < 3) return $('err').innerText = 'Только латиница и цифры (мин. 3)';
      $('err').innerText = 'Подключение к камере...';

      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(s => {
          stream = s; $('local').srcObject = s;
          $('err').innerText = 'Регистрация в сети...';
          
          // PeerJS
          peer = new Peer(id, {
            host: '0.peerjs.com', port: 443, path: '/', secure: true,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' },{ urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }] }
          });

          peer.on('open', () => {
            myId = id;
            $('myid').innerText = `ID: ${id}`;
            $('reg').style.display = 'none';
            $('app').style.display = 'block';
            $('st').innerText = 'В сети';

            // Presence (Firebase)
            if (db) {
              const userRef = db.ref('online_users/' + id);
              userRef.set({ name: id, timestamp: Date.now() });
              userRef.onDisconnect().remove();
              db.ref('online_users').on('value', snap => {
                onlineUsers = snap.val() || {};
                renderList();
              });
            } else {
              renderList(); // Fallback
            }
          });

          peer.on('error', err => {
            console.error(err);
            if (err.type === 'unavailable') $('err').innerText = 'Сервер PeerJS недоступен. Попробуйте позже или включите VPN.';
          });

          peer.on('call', c => {
            if (confirm(`Входящий звонок от ${c.peer}. Принять?`)) {
              c.answer(stream); setupCall(c);
            } else c.close();
          });
        }).catch(() => $('err').innerText = 'Разрешите доступ к камере/микрофону');
    }

    // Список онлайн
    function renderList() {
      const u = $('ulist'); u.innerHTML = '';
      const list = Object.values(onlineUsers).filter(u => u.name !== myId);
      if (!list.length) u.innerHTML = '<div class="empty">Нет других пользователей онлайн</div>';
      list.forEach(usr => {
        const d = document.createElement('div'); d.className = 'uitem';
        d.innerHTML = `<span>${usr.name}</span><svg width="16" height="16" viewBox="0 0 24 24" fill="#4caf50"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>`;
        d.onclick = () => { closeMenu(); dial(usr.name); }; 
        u.appendChild(d);
      });
    }

    function openMenu() { $('menu').style.display = 'flex'; renderList(); }
    function closeMenu() { $('menu').style.display = 'none'; }
    function callDirect() { const i = $('cid').value.trim().replace(/[^a-zA-Z0-9]/g,'').toLowerCase(); if(i && i !== myId) { closeMenu(); dial(i); } }

    // Звонок
    function dial(id) {
      if (!peer || !peer.open) return alert('Подождите подключения к сети...');
      $('st').innerText = `Набор: ${id}`;
      call = peer.call(id, stream);
      setupCall(call);
    }

    function setupCall(c) {
      call = c;
      c.on('stream', remote => {
        $('remote').srcObject = remote;
        $('remote').muted = true; $('remote').play().catch(()=>{});
        setTimeout(() => { $('remote').muted = false; }, 1500); // Фикс Android
        $('st').innerText = 'Подключено'; $('dot').classList.add('on');
        $('fab').className = 'fab end'; $('hang').style.display = 'flex';
        $('chatInput').disabled = false;
        // DataChannel
        if (!dataConn) {
          dataConn = c.peerConnection.createDataChannel('chat');
          dataConn.onopen = () => addMsg('Канал связи установлен', 'sys');
          dataConn.onmessage = e => addMsg(e.data, 'recv');
        }
      });
      c.on('close', endCall);
      c.on('error', () => endCall());
    }

    function endCall() {
      if (call) call.close();
      $('remote').srcObject = null; $('st').innerText = 'Завершено'; $('dot').classList.remove('on');
      $('fab').className = 'fab'; $('hang').style.display = 'none'; $('chatInput').disabled = true;
      call = dataConn = null;
    }
    function hangup() { endCall(); }

    // Управление
    function toggle(type) {
      if (!stream) return;
      const t = type === 'mic' ? stream.getAudioTracks()[0] : stream.getVideoTracks()[0];
      t.enabled = !t.enabled;
      $(type).className = t.enabled ? 'cbtn on' : 'cbtn off';
    }
    async function toggleScreen() {
      if (!peer || !peer.open) return alert('Сначала войдите в сеть');
      try {
        const s = await navigator.mediaDevices.getDisplayMedia({ video: true });
        const v = s.getVideoTracks()[0];
        const sender = peer?.connections[Object.keys(peer.connections)[0]]?.peerConnection?.getSenders()?.find(x => x.track?.kind === 'video');
        if (sender) { sender.replaceTrack(v); $('local').srcObject = s; $('screen').classList.add('off'); }
        v.onended = () => { sender.replaceTrack(stream.getVideoTracks()[0]); $('local').srcObject = stream; $('screen').classList.remove('off'); };
      } catch(e) { console.warn(e); }
    }
    function toggleChat() { $('chatPanel').classList.toggle('open'); }
    function copyId() { if(myId) { navigator.clipboard.writeText(myId); alert('ID скопирован'); } }
    function sendMsg() {
      const i = $('chatInput'), t = i.value.trim();
      if (t && dataConn && dataConn.readyState === 'open') { dataConn.send(t); addMsg(t, 'sent'); i.value = ''; }
    }
    function addMsg(t, type) {
      const d = document.createElement('div'); d.className = `msg ${type}`; d.textContent = t;
      $('msgs').appendChild(d); $('msgs').scrollTop = $('msgs').scrollHeight;
    }

    $('uid').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
    $('cid').addEventListener('keydown', e => { if(e.key==='Enter') callDirect(); });
  </script>
</body>
</html>
