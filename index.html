<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>P2P Messenger</title>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root { --bg:#0a0a0a; --panel:#111; --border:#222; --text:#e0e0e0; --accent:#fff; --danger:#cf6679; --success:#4caf50; --screen:#ff9800; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,sans-serif; }
    body { background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
    
    /* Вход */
    #login { position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center; }
    .box { background:var(--panel); padding:32px; border-radius:12px; border:1px solid var(--border); width:90%; max-width:300px; text-align:center; }
    .input { width:100%; padding:14px; margin:12px 0; background:#1a1a1a; border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:16px; outline:none; }
    .btn { width:100%; padding:14px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
    
    /* Приложение */
    #app { display:none; height:100%; position:relative; }
    .vid { position:absolute; inset:0; background:#000; }
    #remote { width:100%; height:100%; object-fit:cover; }
    #local { position:absolute; bottom:100px; right:16px; width:140px; aspect-ratio:16/9; object-fit:cover; border:2px solid #333; border-radius:8px; transform:scaleX(-1); transition:border-color 0.2s; }
    #local.screen { border-color:var(--screen); box-shadow:0 0 0 2px var(--screen); }
    
    .status { position:absolute; top:16px; left:16px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:20px; font-size:13px; display:flex; align-items:center; gap:6px; }
    .status-dot { width:6px; height:6px; border-radius:50%; background:#555; } .status-dot.on { background:var(--success); box-shadow:0 0 6px var(--success); }
    .myid { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.1); padding:6px 12px; border-radius:20px; font-size:13px; cursor:pointer; }
    
    /* Сайдбар */
    .sidebar { position:absolute; top:0; right:0; width:240px; height:100%; background:var(--panel); border-left:1px solid var(--border); display:flex; flex-direction:column; transform:translateX(100%); transition:0.3s; z-index:50; }
    .sidebar.open { transform:translateX(0); }
    .list { flex:1; overflow-y:auto; padding:8px; }
    .user { padding:10px 12px; border-radius:6px; display:flex; justify-content:space-between; cursor:pointer; font-size:14px; }
    .user:hover { background:#1a1a1a; }
    .empty { padding:24px; text-align:center; color:#666; font-size:13px; }
    
    /* Управление */
    .controls { position:absolute; bottom:0; left:0; width:100%; height:80px; background:linear-gradient(transparent,#000); display:flex; justify-content:center; align-items:center; gap:20px; }
    .cbtn { width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.12); border:none; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:0.2s; }
    .cbtn:hover { background:rgba(255,255,255,0.2); }
    .cbtn.on { background:#fff; color:#000; }
    .cbtn.off { background:var(--danger); }
    .cbtn.screen { background:var(--screen); color:#000; }
    
    .fab { position:absolute; bottom:100px; right:16px; width:52px; height:52px; border-radius:50%; background:var(--accent); color:#000; border:none; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

  <!-- ВХОД -->
  <div id="login">
    <div class="box">
      <h2>Ваш ID</h2>
      <input class="input" id="uid" placeholder="a-z0-9, мин. 3" maxlength="12">
      <button class="btn" onclick="login()">ВОЙТИ</button>
      <div id="err" style="color:var(--danger); font-size:13px; margin-top:8px;"></div>
    </div>
  </div>

  <!-- ИНТЕРФЕЙС -->
  <div id="app">
    <div class="vid">
      <video id="remote" autoplay playsinline muted></video>
      <video id="local" autoplay muted playsinline></video>
    </div>
    <div class="status"><div class="status-dot" id="dot"></div><span id="st">Подключение...</span></div>
    <div class="myid" id="myid" onclick="copyId()">ID: ---</div>
    
    <button class="fab" onclick="toggleSidebar()">👥</button>

    <div class="controls">
      <button class="cbtn on" id="mic" onclick="toggle('mic')" title="Микрофон">🎤</button>
      <button class="cbtn on" id="cam" onclick="toggle('cam')" title="Камера">📷</button>
      <button class="cbtn" id="screen" onclick="toggleScreen()" title="Демонстрация экрана">🖥️</button>
      <button class="cbtn" id="hang" onclick="hangup()" style="display:none;background:var(--danger)" title="Завершить">✕</button>
    </div>

    <!-- СПИСОК ОНЛАЙН -->
    <div class="sidebar" id="sidebar">
      <div style="padding:16px; border-bottom:1px solid var(--border); font-weight:500; display:flex; justify-content:space-between;">
        Онлайн <span onclick="toggleSidebar()" style="cursor:pointer">✕</span>
      </div>
      <div class="list" id="ulist"><div class="empty">Загрузка...</div></div>
    </div>
  </div>

  <script>
    const PRESENCE_URL = 'https://secure-p2p-messenger.onrender.com';
    const socket = io(PRESENCE_URL);
    
    let peer, call, stream, myId, originalVideoTrack, isScreenSharing = false;
    const $ = id => document.getElementById(id);

    function login() {
      const id = $('uid').value.trim().replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
      if(id.length<3) return $('err').innerText = 'Только a-z и 0-9 (мин. 3)';
      
      navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s => {
        stream = s; 
        originalVideoTrack = s.getVideoTracks()[0];
        $('local').srcObject = s;
        myId = id;
        
        peer = new Peer(myId, {
          host: '0.peerjs.com', port: 443, path: '/', secure: true,
          config: { iceServers: [{urls:'stun:stun.l.google.com:19302'}] }
        });
        
        peer.on('open', () => {
          $('login').style.display = 'none';
          $('app').style.display = 'block';
          $('myid').innerText = `ID: ${id}`;
          $('st').innerText = 'В сети';
          socket.emit('register', myId);
        });
        
        peer.on('error', err => { $('err').innerText = 'PeerJS: ' + err.type; });
        
        peer.on('call', c => {
          if(confirm(`Звонок от ${c.peer}. Принять?`)) {
            c.answer(stream);
            handleCall(c);
          }
        });
      }).catch(() => $('err').innerText = 'Разрешите камеру');
    }

    socket.on('user-list', users => {
      const list = $('ulist'); list.innerHTML = '';
      const others = users.filter(u => u !== myId);
      if(!others.length) list.innerHTML = '<div class="empty">Нет других пользователей</div>';
      others.forEach(u => {
        const d = document.createElement('div'); d.className = 'user';
        d.innerHTML = `<span>${u}</span>📞`;
        d.onclick = () => { toggleSidebar(); dial(u); };
        list.appendChild(d);
      });
    });

    function toggleSidebar() { $('sidebar').classList.toggle('open'); }

    function dial(id) {
      if(!peer || !peer.open) return alert('Подождите подключения...');
      $('st').innerText = `Набор: ${id}`;
      const c = peer.call(id, stream);
      handleCall(c);
    }

    function handleCall(c) {
      call = c;
      c.on('stream', remote => {
        $('remote').srcObject = remote;
        $('remote').muted = true; $('remote').play().catch(()=>{});
        setTimeout(()=>$('remote').muted=false, 1500);
        $('st').innerText = 'Подключено';
        $('dot').classList.add('on');
        $('hang').style.display = 'flex';
        $('screen').style.display = 'flex'; // Показываем кнопку экрана
      });
      c.on('close', endCall);
      c.on('error', () => endCall());
    }

    // 🖥️ ДЕМОНСТРАЦИЯ ЭКРАНА
    async function toggleScreen() {
      if (!call || !call.peerConnection) return alert('Сначала начните звонок');
      
      try {
        if (!isScreenSharing) {
          // === ВКЛЮЧИТЬ ЭКРАН ===
          const screenStream = await navigator.mediaDevices.getDisplayMedia({ 
            video: { cursor: 'always' }, 
            audio: false 
          });
          
          const screenTrack = screenStream.getVideoTracks()[0];
          
          // Сохраняем оригинальную камеру, если ещё не сохранена
          if (!originalVideoTrack) {
            originalVideoTrack = stream.getVideoTracks()[0];
          }
          
          // Находим видео-сендер и заменяем трек
          const sender = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
          if (sender) {
            await sender.replaceTrack(screenTrack);
          }
          
          // Обновляем локальное превью
          $('local').srcObject = screenStream;
          $('local').classList.add('screen');
          $('screen').classList.add('screen');
          
          isScreenSharing = true;
          
          // Если пользователь нажмёт "Остановить" в браузере
          screenTrack.onended = () => {
            stopScreenShare();
          };
          
        } else {
          // === ВЫКЛЮЧИТЬ ЭКРАН ===
          stopScreenShare();
        }
      } catch (err) {
        console.error('Screen share error:', err);
        if (err.name !== 'NotAllowedError') {
          alert('Не удалось запустить демонстрацию экрана');
        }
      }
    }
    
    function stopScreenShare() {
      if (!call || !originalVideoTrack) return;
      
      // Возвращаем камеру в звонок
      const sender = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) {
        sender.replaceTrack(originalVideoTrack);
      }
      
      // Возвращаем локальное превью
      $('local').srcObject = stream;
      $('local').classList.remove('screen');
      $('screen').classList.remove('screen');
      
      isScreenSharing = false;
    }

    function endCall() { 
      if(call) call.close(); 
      $('remote').srcObject=null; 
      $('st').innerText='Завершено'; 
      $('dot').classList.remove('on'); 
      $('hang').style.display='none'; 
      call=null;
      // Сброс экрана при завершении звонка
      if (isScreenSharing) stopScreenShare();
    }
    function hangup() { endCall(); }
    
    function toggle(type) { 
      if(!stream) return; 
      const t=type==='mic'?stream.getAudioTracks()[0]:stream.getVideoTracks()[0]; 
      t.enabled=!t.enabled; 
      $(type).className=t.enabled?'cbtn on':'cbtn off'; 
    }
    
    function copyId() { if(myId) { navigator.clipboard.writeText(myId); alert('Скопировано'); } }
    $('uid').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  </script>
</body>
</html>
