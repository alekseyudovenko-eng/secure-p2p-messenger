<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureP2P Messenger</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-input: #334155;
            --border: #475569;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            height: 60px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }
        .app-title { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
        .connection-group { display: flex; align-items: center; gap: 12px; }
        .status-indicator { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--text-secondary); }
        .status-dot.active { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        input, select {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }
        .btn-primary {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-primary:disabled { background-color: var(--bg-input); color: var(--text-secondary); cursor: not-allowed; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .video-section { flex: 1; display: flex; flex-direction: column; background-color: #000; position: relative; }
        .video-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #localVideo {
            position: absolute;
            bottom: 90px;
            right: 24px;
            width: 280px;
            height: 210px;
            object-fit: cover;
            border: 2px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            background: #222;
            z-index: 10;
        }
        .controls-bar {
            height: 80px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 20;
        }
        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-input);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-btn:hover { background-color: var(--border); }
        .control-btn.active { background-color: var(--text-primary); color: var(--bg-dark); }
        .control-btn.danger { background-color: var(--danger); color: white; width: 56px; height: 56px; }
        .control-btn.danger:hover { background-color: var(--danger-hover); }
        .control-btn svg { width: 22px; height: 22px; }
        .chat-section {
            width: 380px;
            background-color: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { background-color: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.received { background-color: var(--bg-input); color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.system { background-color: transparent; color: var(--text-secondary); font-size: 12px; text-align: center; align-self: center; max-width: 100%; }
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        .chat-input-area input { flex: 1; padding: 10px 14px; }
        .chat-input-area button {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .chat-input-area button:hover { background-color: var(--accent-hover); }
        .chat-input-area button svg { width: 18px; height: 18px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="app-title">SecureP2P Communicator</div>
        <div class="connection-group">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="connectionStatus">Ожидание подключения</span>
            </div>
            <!-- ВАЖНО: Замените localhost на адрес вашего сервера после деплоя бэкенда -->
            <input type="text" id="myId" placeholder="Ваш ID" value="user1" style="width: 120px;">
            <button class="btn-primary" onclick="register()">Войти в сеть</button>
            <select id="userList" style="width: 140px;"><option value="">Выберите абонента</option></select>
            <button class="btn-primary" onclick="startCall()" id="btnCall" disabled>Позвонить</button>
        </div>
    </header>

    <div class="main-container">
        <div class="video-section">
            <div class="video-container">
                <video id="remoteVideo" autoplay playsinline></video>
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
            <div class="controls-bar">
                <button class="control-btn" id="btnMic" onclick="toggleMic()" title="Микрофон">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button class="control-btn" id="btnCam" onclick="toggleCam()" title="Камера">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                </button>
                <button class="control-btn" id="btnScreen" onclick="toggleScreenShare()" title="Демонстрация экрана">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                </button>
                <button class="control-btn danger" onclick="endCall()" id="btnEnd" disabled title="Завершить">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg>
                </button>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <span>Защищенный чат (E2EE)</span>
                <span style="font-size: 12px; color: var(--text-secondary); font-weight: 400;">AES-256-GCM</span>
            </div>
            <div class="chat-messages" id="chatArea">
                <div class="message system">Ожидание установления P2P-соединения...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ВНИМАНИЕ: Для работы через GitHub Pages замените 'http://localhost:3000' 
        // на URL вашего запущенного сервера (например, https://your-app.onrender.com)
        const SIGNALING_SERVER_URL = 'http://localhost:3000'; 
        const socket = io(SIGNALING_SERVER_URL);
        
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        let localStream;
        let peerConnection;
        let dataChannel;
        let myUserId = '';
        let cryptoKey;
        let isMicOn = true;
        let isCamOn = true;
        let isScreenSharing = false;
        let originalVideoTrack = null;

        async function initCrypto() {
            cryptoKey = await window.crypto.subtle.generateKey(
                { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
            );
        }

        async function encryptMessage(text) {
            const enc = new TextEncoder();
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await window.crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv }, cryptoKey, enc.encode(text)
            );
            const buffer = new Uint8Array(iv.byteLength + ciphertext.byteLength);
            buffer.set(iv, 0);
            buffer.set(new Uint8Array(ciphertext), iv.byteLength);
            return btoa(String.fromCharCode(...buffer));
        }

        async function decryptMessage(base64Payload) {
            try {
                const binaryString = atob(base64Payload);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                const iv = bytes.slice(0, 12);
                const ciphertext = bytes.slice(12);
                const decrypted = await window.crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv }, cryptoKey, ciphertext
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[Ошибка расшифровки]";
            }
        }

        async function startLocalVideo() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                originalVideoTrack = localStream.getVideoTracks()[0];
                updateControlIcons();
            } catch (err) {
                console.error("Ошибка доступа к медиа:", err);
                appendMessage("Ошибка доступа к камере/микрофону", "system");
            }
        }

        function createPeerConnection(isInitiator) {
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', {
                        to: document.getElementById('userList').value,
                        candidate: event.candidate
                    });
                }
            };
            if (isInitiator) {
                dataChannel = peerConnection.createDataChannel('chat', { ordered: true });
                setupDataChannel(dataChannel);
            } else {
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel(dataChannel);
                };
            }
        }

        function setupDataChannel(channel) {
            channel.onopen = () => {
                document.getElementById('connectionStatus').innerText = 'P2P-соединение активно (E2EE)';
                document.getElementById('statusDot').classList.add('active');
                appendMessage("Защищенный канал связи установлен", "system");
            };
            channel.onmessage = async (event) => {
                const decryptedText = await decryptMessage(event.data);
                appendMessage(decryptedText, 'received');
            };
        }

        async function startCall() {
            const targetUser = document.getElementById('userList').value;
            if (!targetUser) return alert('Выберите абонента');
            createPeerConnection(true);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call-user', { userToCall: targetUser, signalData: offer, from: myUserId });
            document.getElementById('btnCall').disabled = true;
            document.getElementById('btnEnd').disabled = false;
        }

        async function endCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (isScreenSharing) await toggleScreenShare();
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('btnCall').disabled = false;
            document.getElementById('btnEnd').disabled = true;
            document.getElementById('connectionStatus').innerText = 'Звонок завершен';
            document.getElementById('statusDot').classList.remove('active');
            appendMessage("Соединение разорвано", "system");
        }

        function toggleMic() {
            if (!localStream) return;
            isMicOn = !isMicOn;
            localStream.getAudioTracks().forEach(track => track.enabled = isMicOn);
            updateControlIcons();
        }

        function toggleCam() {
            if (!localStream || isScreenSharing) return;
            isCamOn = !isCamOn;
            localStream.getVideoTracks().forEach(track => track.enabled = isCamOn);
            document.getElementById('localVideo').classList.toggle('muted', !isCamOn);
            updateControlIcons();
        }

        async function toggleScreenShare() {
            if (!peerConnection) return alert('Сначала установите соединение');
            if (!isScreenSharing) {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const screenTrack = screenStream.getVideoTracks()[0];
                    if (!originalVideoTrack) originalVideoTrack = localStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) {
                        await sender.replaceTrack(screenTrack);
                    }
                    document.getElementById('localVideo').srcObject = screenStream;
                    isScreenSharing = true;
                    screenTrack.onended = () => { toggleScreenShare(); };
                } catch (err) {
                    console.error("Ошибка демонстрации экрана:", err);
                }
            } else {
                const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender && originalVideoTrack) {
                    await sender.replaceTrack(originalVideoTrack);
                }
                document.getElementById('localVideo').srcObject = localStream;
                isScreenSharing = false;
            }
            updateControlIcons();
        }

        function updateControlIcons() {
            const btnMic = document.getElementById('btnMic');
            const btnCam = document.getElementById('btnCam');
            const btnScreen = document.getElementById('btnScreen');
            btnMic.innerHTML = isMicOn 
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>';
            btnCam.innerHTML = isCamOn && !isScreenSharing
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            btnScreen.classList.toggle('active', isScreenSharing);
            btnMic.classList.toggle('active', isMicOn);
            btnCam.classList.toggle('active', isCamOn && !isScreenSharing);
        }

        function register() {
            myUserId = document.getElementById('myId').value;
            if (!myUserId) return alert('Введите ваш ID');
            socket.emit('register', myUserId);
            startLocalVideo();
            initCrypto();
            appendMessage(`Вы вошли в сеть как ${myUserId}`, "system");
        }

        socket.on('user-list', (users) => {
            const select = document.getElementById('userList');
            select.innerHTML = '<option value="">Выберите абонента</option>';
            users.forEach(user => {
                if (user !== myUserId) {
                    const option = document.createElement('option');
                    option.value = user;
                    option.innerText = user;
                    select.appendChild(option);
                }
            });
        });

        socket.on('incoming-call', async (data) => {
            if (confirm(`Входящий защищенный звонок от ${data.from}. Принять?`)) {
                createPeerConnection(false);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('answer-call', { to: data.from, signal: answer });
                document.getElementById('btnEnd').disabled = false;
                document.getElementById('btnCall').disabled = true;
            }
        });

        socket.on('call-accepted', async (signal) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
            document.getElementById('btnEnd').disabled = false;
            document.getElementById('btnCall').disabled = true;
        });

        socket.on('ice-candidate', async (candidate) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !dataChannel || dataChannel.readyState !== 'open') {
                if(!dataChannel || dataChannel.readyState !== 'open') appendMessage("Дождитесь установления P2P-соединения", "system");
                return;
            }
            const encryptedPayload = await encryptMessage(text);
            dataChannel.send(encryptedPayload);
            appendMessage(text, 'sent');
            input.value = '';
        }

        function appendMessage(text, type) {
            const chatArea = document.getElementById('chatArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerText = text;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
