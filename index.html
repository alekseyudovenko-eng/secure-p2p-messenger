<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Messenger</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Верхняя панель */
        .header {
            background: #2d2d2d;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #444;
        }
        input, select, button {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
        }
        /* КНОПКА ПОЗВОНИТЬ - Яркая и большая */
        #btnCall {
            background-color: #28a745; /* Зеленый */
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        #btnCall:hover {
            background-color: #218838;
            transform: scale(1.05);
        }
        #btnCall:disabled {
            background-color: #555;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Основная часть */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .video-area {
            flex: 2;
            background: black;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #localVideo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            border: 2px solid white;
            border-radius: 8px;
        }
        .chat-area {
            flex: 1;
            background: #222;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            border: 1px solid #333;
            padding: 5px;
        }
        .msg { margin: 5px 0; padding: 5px; border-radius: 4px; }
        .sent { background: #0056b3; text-align: right; }
        .received { background: #444; }
    </style>
</head>
<body>

    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <div class="header">
        <input type="text" id="myId" placeholder="Ваш ID (например, Alex)" style="width: 150px;">
        <button onclick="register()">Войти</button>
        
        <select id="userList" style="width: 150px;">
            <option value="">Список пуст...</option>
        </select>
        
        <!-- КНОПКА ПОЗВОНИТЬ -->
        <button id="btnCall" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
        <button id="btnEnd" onclick="endCall()" disabled style="background:#dc3545;">❌ Сброс</button>
    </div>

    <!-- ВИДЕО И ЧАТ -->
    <div class="main">
        <div class="video-area">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="chat-area">
            <div id="messages"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1;">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        console.log("СКРИПТ ЗАГРУЖЕН");

        const socket = io('https://secure-p2p-messenger.onrender.com');
        let localStream, peerConnection, dataChannel, myId;
        
        // Настройка WebRTC
        // Замените старую строку const config = ... на этот блок:
        const config = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                // Публичный TURN сервер для тестов (может быть перегружен, но лучше чем ничего)
                {
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ] 
        };

        // Обновление списка пользователей
        socket.on('user-list', (users) => {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            users.forEach(u => {
                if(u !== myId) {
                    const opt = document.createElement('option');
                    opt.value = u;
                    opt.innerText = u;
                    list.appendChild(opt);
                }
            });
            if(list.options.length === 0) list.innerHTML = '<option>Нет других пользователей</option>';
        });

        // Логика звонка
        async function startCall() {
            console.log("КНОПКА НАЖАТА!");
            const target = document.getElementById('userList').value;
            if(!target) return alert("Выберите кого-нибудь из списка!");
            if(!localStream) return alert("Сначала нажмите 'Войти' и разрешите камеру!");

            peerConnection = new RTCPeerConnection(config);
            
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            
            peerConnection.onicecandidate = e => {
                if(e.candidate) socket.emit('ice-candidate', { to: target, candidate: e.candidate });
            };

            dataChannel = peerConnection.createDataChannel('chat');
            dataChannel.onmessage = e => addMsg(e.data, 'received');
            dataChannel.onopen = () => console.log("Канал данных открыт");

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            socket.emit('call-user', { userToCall: target, signalData: offer, from: myId });
            
            document.getElementById('btnCall').disabled = true;
            document.getElementById('btnEnd').disabled = false;
            console.log("Звонок инициирован");
        }

        async function endCall() {
            if(peerConnection) peerConnection.close();
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('btnCall').disabled = false;
            document.getElementById('btnEnd').disabled = true;
        }

        // Обработка входящего звонка
        socket.on('incoming-call', async (data) => {
            if(confirm(`Звонок от ${data.from}. Принять?`)) {
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
                
                peerConnection.ondatachannel = e => {
                    dataChannel = e.channel;
                    dataChannel.onmessage = msg => addMsg(msg.data, 'received');
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('answer-call', { to: data.from, signal: answer });
                document.getElementById('btnEnd').disabled = false;
            }
        });

        socket.on('call-accepted', async (signal) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
        });

        socket.on('ice-candidate', async (cand) => {
            if(peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
        });

        // Чат
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value;
            if(text && dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(text);
                addMsg(text, 'sent');
                input.value = '';
            } else {
                console.log("Канал данных еще не открыт или сообщение пустое");
            }
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            document.getElementById('messages').appendChild(div);
        }
    </script>
</body>
</html>
