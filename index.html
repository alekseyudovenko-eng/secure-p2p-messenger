<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple P2P Call</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; background: #1a1a1a; color: white; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; 
            height: 100vh; box-sizing: border-box; 
        }
        #login { text-align: center; margin-top: 100px; }
        #app { display: none; flex: 1; flex-direction: column; }
        video { width: 100%; max-height: 40%; background: black; margin: 5px 0; }
        #remoteVideo { flex: 1; object-fit: cover; }
        #localVideo { position: absolute; bottom: 100px; right: 20px; width: 120px; border: 2px solid white; }
        #status { background: #333; padding: 10px; margin: 10px 0; border-radius: 4px; font-size: 14px; }
        #myId { background: #007acc; padding: 10px; border-radius: 4px; cursor: pointer; display: inline-block; margin: 10px 0; }
        input, button { padding: 12px; margin: 5px; border-radius: 4px; border: none; font-size: 16px; }
        input { background: #333; color: white; width: 200px; }
        button { background: #03dac6; color: black; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="login">
        <h2>Вход</h2>
        <input type="text" id="userId" placeholder="Ваш ID (например, alex)">
        <br>
        <button onclick="doLogin()">ВОЙТИ</button>
        <div id="loginError" style="color: #cf6679; margin-top: 10px;"></div>
    </div>

    <!-- ПРИЛОЖЕНИЕ -->
    <div id="app">
        <div id="status">Статус: Инициализация...</div>
        <div id="myId" onclick="copyId()">Ваш ID: загрузка...</div>
        
        <video id="remoteVideo" autoplay playsinline muted></video>
        <video id="localVideo" autoplay muted playsinline></video>
        
        <div style="margin-top: 10px;">
            <input type="text" id="targetId" placeholder="ID собеседника">
            <button id="callBtn" onclick="doCall()">📞 Позвонить</button>
            <button id="hangupBtn" class="hidden" onclick="doHangup()" style="background:#cf6679;">❌ Сброс</button>
        </div>
        
        <div style="margin-top: 10px; flex: 1; display: flex; flex-direction: column;">
            <div id="chat" style="flex:1; background:#222; padding:10px; overflow-y:auto; border-radius:4px;"></div>
            <div style="display:flex; margin-top:5px;">
                <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1;">
                <button onclick="sendMsg()" style="width:60px;">➤</button>
            </div>
        </div>
    </div>

    <script>
        console.log("🚀 Script started");
        
        let peer, localStream, call, dataConn, myId;
        const status = document.getElementById('status');
        
        function log(msg) {
            console.log(msg);
            status.innerText = "Статус: " + msg;
        }

        // ВХОД
        async function doLogin() {
            const id = document.getElementById('userId').value.trim();
            if (!id) return alert("Введите ID!");
            
            log("Запрос камеры...");
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                log("Камера ОК. Подключение к PeerJS...");
                
                // PeerJS с публичным сервером
                peer = new Peer(id, {
                    host: '0.peerjs.com',
                    port: 443,
                    path: '/',
                    secure: true,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
                        ]
                    }
                });
                
                peer.on('open', (pid) => {
                    log("Подключен! Ваш ID: " + pid);
                    myId = pid;
                    document.getElementById('myId').innerText = "Ваш ID: " + pid + " (нажми чтобы скопировать)";
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                });
                
                peer.on('error', (err) => {
                    log("❌ PeerJS ошибка: " + err.type);
                    console.error(err);
                    if (err.type === 'unavailable') {
                        alert("Сервер PeerJS недоступен. Попробуйте через 1 минуту или включите VPN.");
                    }
                });
                
                // Входящий звонок
                peer.on('call', (incomingCall) => {
                    log("🔔 Входящий звонок от " + incomingCall.peer);
                    if (confirm("Звонок от " + incomingCall.peer + ". Принять?")) {
                        incomingCall.answer(localStream);
                        handleCall(incomingCall);
                    }
                });
                
                // Входящий чат
                peer.on('connection', (conn) => {
                    dataConn = conn;
                    conn.on('data', (d) => addMsg(d, 'received'));
                    log("Чат подключен");
                });
                
            } catch (e) {
                log("❌ Ошибка камеры: " + e.message);
                alert("Разрешите доступ к камере в настройках браузера!");
            }
        }

        // ИСХОДЯЩИЙ ЗВОНОК
        function doCall() {
            const target = document.getElementById('targetId').value.trim();
            if (!target) return alert("Введите ID собеседника!");
            if (!peer || !peer.id) return alert("Сначала дождитесь подключения!");
            
            log("Звоним " + target + "...");
            call = peer.call(target, localStream);
            handleCall(call);
            
            // Чат
            dataConn = peer.connect(target);
            dataConn.on('open', () => log("Чат подключен"));
            dataConn.on('data', (d) => addMsg(d, 'received'));
        }

        // ОБРАБОТКА ЗВОНКА
        function handleCall(incomingCall) {
            call = incomingCall;
            
            call.on('stream', (remoteStream) => {
                log("🎥 Видео получено!");
                const rv = document.getElementById('remoteVideo');
                rv.srcObject = remoteStream;
                
                // ФИКС ДЛЯ ANDROID
                rv.muted = true;
                rv.play().then(() => {
                    log("✅ Видео запущено");
                    setTimeout(() => { rv.muted = false; }, 2000);
                }).catch(e => log("⚠️ Автоплей: " + e.message));
            });
            
            call.on('close', () => {
                log("Звонок завершен");
                resetCallUI();
            });
            
            call.on('error', (e) => {
                log("❌ Ошибка звонка: " + e);
                resetCallUI();
            });
            
            // UI
            document.getElementById('callBtn').classList.add('hidden');
            document.getElementById('hangupBtn').classList.remove('hidden');
            document.getElementById('targetId').disabled = true;
        }

        function resetCallUI() {
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('callBtn').classList.remove('hidden');
            document.getElementById('hangupBtn').classList.add('hidden');
            document.getElementById('targetId').disabled = false;
            call = null;
        }

        function doHangup() {
            if (call) call.close();
            if (dataConn) dataConn.close();
            resetCallUI();
        }

        // ЧАТ
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (text && dataConn && dataConn.open) {
                dataConn.send(text);
                addMsg(text, 'sent');
                input.value = '';
            }
        }
        
        function addMsg(text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.style.cssText = `background:${type==='sent'?'#007acc':'#333'}; padding:8px; margin:4px 0; border-radius:6px;`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // УТИЛИТЫ
        function copyId() {
            if (myId) {
                navigator.clipboard.writeText(myId);
                alert("ID скопирован: " + myId);
            }
        }
    </script>
</body>
</html>
