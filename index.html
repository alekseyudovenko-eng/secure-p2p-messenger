<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Messenger</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --accent: #007acc;
            --text: #e0e0e0;
            --border: #333;
            --danger: #cf6679;
            --success: #03dac6;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            /* Запрет выделения текста для ощущения приложения */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* --- ЭКРАН ВХОДА --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .login-box {
            background: var(--bg-panel); padding: 30px; border-radius: 16px;
            width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border);
        }
        .login-input {
            width: 100%; padding: 15px; margin: 20px 0;
            background: #2c2c2c; border: 1px solid var(--border);
            color: white; border-radius: 8px; font-size: 18px; text-align: center;
            box-sizing: border-box; outline: none;
        }
        .btn-login {
            width: 100%; padding: 15px; background: var(--accent);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        .btn-login:active { transform: scale(0.98); }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        #app-interface { display: none; height: 100%; position: relative; }

        /* Видео фон */
        .video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1;
        }
        #remoteVideo { 
            width: 100%; height: 100%; object-fit: cover; 
            /* Важно для Android */
            transform: translateZ(0); 
        }
        
        /* Мое видео (PiP) */
        #localVideo {
            position: absolute; bottom: 120px; right: 20px;
            width: 110px; height: 150px;
            object-fit: cover; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px; background: #222; z-index: 2;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transform: scaleX(-1);
        }

        /* Статус сверху */
        .status-bar {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 10; display: flex; justify-content: space-between; align-items: center;
            pointer-events: none;
        }
        .my-id-badge {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(5px);
            padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: bold;
            pointer-events: auto; cursor: pointer; color: white;
        }
        .call-status {
            background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 15px; font-size: 13px; color: #fff;
        }

        /* Панель управления снизу */
        .controls-bar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 100px; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            z-index: 10; display: flex; justify-content: space-evenly; align-items: center;
            padding-bottom: 10px;
        }
        .ctrl-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .ctrl-btn.active { background: white; color: black; }
        .ctrl-btn.disabled { background: var(--danger); color: white; border: none; }
        
        /* Кнопка сброса (большая красная) */
        .btn-hangup { 
            background: var(--danger); 
            width: 64px; height: 64px; 
            font-size: 24px;
            display: none; /* Скрыта пока нет звонка */
            box-shadow: 0 4px 15px rgba(207, 102, 121, 0.4);
        }

        /* Кнопка чата (плавающая) */
        .fab-chat {
            position: absolute; bottom: 130px; right: 20px;
            width: 56px; height: 56px; background: var(--accent);
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; cursor: pointer; z-index: 20;
            transition: transform 0.2s;
        }
        .fab-chat:active { transform: scale(0.9); }

        /* Панель чата */
        .chat-panel {
            position: absolute; top: 0; right: -100%; width: 100%; height: 100%;
            background: rgba(30, 30, 30, 0.98); backdrop-filter: blur(10px);
            z-index: 30; transition: right 0.3s ease;
            display: flex; flex-direction: column;
        }
        .chat-panel.open { right: 0; }
        
        .chat-header {
            padding: 20px; background: #252525; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 18px;
        }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; }
        .msg.sent { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .chat-input-area {
            padding: 15px; background: #252525; border-top: 1px solid #333;
            display: flex; gap: 10px;
        }
        .chat-input-area input {
            flex: 1; background: #333; border: none; padding: 12px;
            border-radius: 25px; color: white; outline: none; font-size: 16px;
        }
        .chat-send-btn {
            width: 45px; height: 45px; background: var(--accent); border-radius: 50%;
            border: none; color: white; display: flex; align-items: center; justify-content: center;
        }

        /* МОДАЛЬНОЕ ОКНО ВЫБОРА КОНТАКТОВ */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-box {
            background: var(--bg-panel); width: 90%; max-width: 350px;
            border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
            animation: popIn 0.2s ease;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-header {
            padding: 15px; background: #252525; border-bottom: 1px solid var(--border);
            font-weight: bold; display: flex; justify-content: space-between;
        }
        .contact-list {
            max-height: 300px; overflow-y: auto;
        }
        .contact-item {
            padding: 15px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: background 0.2s;
        }
        .contact-item:hover { background: #333; }
        .contact-item:active { background: #444; }
        .contact-name { font-size: 16px; font-weight: 500; }
        .btn-call-icon { color: var(--success); font-size: 18px; }
        
        .empty-list { padding: 20px; text-align: center; color: #666; }

        /* Кнопка вызова модалки (если нет активного звонка) */
        .fab-call {
            position: absolute; bottom: 130px; left: 20px;
            width: 56px; height: 56px; background: var(--success);
            border-radius: 50%; box-shadow: 0 4px 10px rgba(3, 218, 198, 0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: black; cursor: pointer; z-index: 20;
        }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-top:0;">Вход</h2>
            <p style="color:#888; font-size:14px;">Придумайте ваш уникальный ID</p>
            <input type="text" id="loginInput" class="login-input" placeholder="Например: Алексей" maxlength="15">
            <button class="btn-login" onclick="attemptLogin()">ВОЙТИ В СЕТЬ</button>
        </div>
    </div>

    <!-- 2. ИНТЕРФЕЙС ПРИЛОЖЕНИЯ -->
    <div id="app-interface">
        
        <!-- Видео -->
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <!-- Верхняя панель -->
        <div class="status-bar">
            <div class="call-status" id="statusText">Ожидание...</div>
            <div class="my-id-badge" id="myIdDisplay" onclick="copyId()">ID: ...</div>
        </div>

        <!-- Плавающие кнопки (Чат и Звонок) -->
        <div class="fab-chat" onclick="toggleChat()">
            <i class="fas fa-comment-alt"></i>
        </div>
        
        <!-- Кнопка "Позвонить" (открывает список) -->
        <div class="fab-call" id="fabCallBtn" onclick="openContactsModal()">
            <i class="fas fa-phone-plus"></i>
        </div>

        <!-- Панель чата -->
        <div class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <span>Сообщения</span>
                <i class="fas fa-times" onclick="toggleChat()" style="cursor:pointer; padding:5px;"></i>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Сообщение..." disabled>
                <button class="chat-send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- Нижняя панель управления -->
        <div class="controls-bar">
            <button class="ctrl-btn active" id="btnMic" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
            <button class="ctrl-btn active" id="btnCam" onclick="toggleCam()"><i class="fas fa-video"></i></button>
            <button class="ctrl-btn" id="btnScreen" onclick="toggleScreen()"><i class="fas fa-desktop"></i></button>
            <!-- Большая кнопка сброса по центру -->
            <button class="ctrl-btn btn-hangup" id="btnHangup" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО КОНТАКТОВ -->
    <div class="modal-overlay" id="contactsModal">
        <div class="modal-box">
            <div class="modal-header">
                <span>Выберите собеседника</span>
                <i class="fas fa-times" onclick="closeContactsModal()" style="cursor:pointer;"></i>
            </div>
            <div class="contact-list" id="contactList">
                <div class="empty-list">Загрузка контактов...</div>
            </div>
        </div>
    </div>

    <script>
        const SIGNALING_SERVER_URL = 'https://secure-p2p-messenger.onrender.com';
        const socket = io(SIGNALING_SERVER_URL);
        
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };

        let localStream, peerConnection, dataChannel, myUserId;
        let isMicOn = true, isCamOn = true;
        let onlineUsers = [];

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const appInterface = document.getElementById('app-interface');
        const loginInput = document.getElementById('loginInput');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusText = document.getElementById('statusText');
        const myIdDisplay = document.getElementById('myIdDisplay');
        const fabCallBtn = document.getElementById('fabCallBtn');
        const btnHangup = document.getElementById('btnHangup');
        const chatPanel = document.getElementById('chatPanel');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        const contactsModal = document.getElementById('contactsModal');
        const contactList = document.getElementById('contactList');

        // 1. ВХОД
        function attemptLogin() {
            const id = loginInput.value.trim();
            if (!id) return alert("Введите ID!");
            
            // Запрос камеры с аудио
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    myUserId = id;
                    localStream = stream;
                    localVideo.srcObject = stream;
                    
                    // Фикс для Android: явный запуск
                    localVideo.play().catch(e => console.log("Autoplay prevented", e));
                    
                    loginScreen.style.display = 'none';
                    appInterface.style.display = 'block';
                    myIdDisplay.innerText = "ID: " + myUserId;
                    
                    socket.emit('register', myUserId);
                    statusText.innerText = "В сети";
                })
                .catch(err => {
                    alert("Ошибка камеры! Разрешите доступ в настройках браузера.");
                    console.error(err);
                });
        }
        loginInput.addEventListener('keypress', e => { if(e.key === 'Enter') attemptLogin(); });

        // 2. СПИСОК КОНТАКТОВ
        socket.on('user-list', (users) => {
            onlineUsers = users.filter(u => u !== myUserId);
            renderContactList();
        });

        function renderContactList() {
            contactList.innerHTML = '';
            if (onlineUsers.length === 0) {
                contactList.innerHTML = '<div class="empty-list">Нет пользователей онлайн</div>';
                return;
            }
            onlineUsers.forEach(user => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `
                    <span class="contact-name"><i class="fas fa-user-circle" style="margin-right:10px; color:#888;"></i> ${user}</span>
                    <i class="fas fa-phone-alt btn-call-icon"></i>
                `;
                div.onclick = () => {
                    closeContactsModal();
                    startCall(user);
                };
                contactList.appendChild(div);
            });
        }

        function openContactsModal() {
            renderContactList();
            contactsModal.style.display = 'flex';
        }

        function closeContactsModal() {
            contactsModal.style.display = 'none';
        }

        // 3. ЗВОНОК
        async function startCall(targetId) {
            statusText.innerText = "Набор номера...";
            fabCallBtn.style.display = 'none'; // Скрыть кнопку вызова
            
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = e => {
                // Фикс для Android: гарантированное воспроизведение
                remoteVideo.srcObject = e.streams[0];
                remoteVideo.play().catch(e => console.error("Remote play error", e));
                
                statusText.innerText = "Звонок идет";
                btnHangup.style.display = 'flex'; // Показать кнопку сброса
            };

            peerConnection.onicecandidate = e => {
                if (e.candidate) socket.emit('ice-candidate', { to: targetId, candidate: e.candidate });
            };

            dataChannel = peerConnection.createDataChannel('chat');
            setupDataChannel(dataChannel);

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call-user', { userToCall: targetId, signalData: offer, from: myUserId });
        }

        // Входящий
        socket.on('incoming-call', async (data) => {
            if (confirm(`Звонок от ${data.from}. Принять?`)) {
                fabCallBtn.style.display = 'none';
                peerConnection = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                peerConnection.ontrack = e => {
                    remoteVideo.srcObject = e.streams[0];
                    remoteVideo.play().catch(e => console.error("Remote play error", e));
                    statusText.innerText = "Звонок идет";
                    btnHangup.style.display = 'flex';
                };

                peerConnection.ondatachannel = e => {
                    dataChannel = e.channel;
                    setupDataChannel(dataChannel);
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('answer-call', { to: data.from, signal: answer });
            }
        });

        socket.on('call-accepted', async (signal) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
        });

        socket.on('ice-candidate', async (cand) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
        });

        function endCall() {
            if (peerConnection) peerConnection.close();
            remoteVideo.srcObject = null;
            statusText.innerText = "Звонок завершен";
            btnHangup.style.display = 'none';
            fabCallBtn.style.display = 'flex'; // Вернуть кнопку вызова
            chatInput.disabled = true;
            peerConnection = null;
        }

        // 4. ЧАТ И UI
        function toggleChat() {
            chatPanel.classList.toggle('open');
        }

        function setupDataChannel(channel) {
            dataChannel = channel;
            channel.onopen = () => {
                chatInput.disabled = false;
                addMsg("Чат подключен", "sys");
            };
            channel.onmessage = e => addMsg(e.data, 'received');
        }

        function sendMsg() {
            const text = chatInput.value.trim();
            if (text && dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(text);
                addMsg(text, 'sent');
                chatInput.value = '';
            }
        }
        chatInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendMsg(); });

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function toggleMic() {
            if(!localStream) return;
            isMicOn = !isMicOn;
            localStream.getAudioTracks()[0].enabled = isMicOn;
            const btn = document.getElementById('btnMic');
            btn.className = isMicOn ? 'ctrl-btn active' : 'ctrl-btn disabled';
        }

        function toggleCam() {
            if(!localStream) return;
            isCamOn = !isCamOn;
            localStream.getVideoTracks()[0].enabled = isCamOn;
            const btn = document.getElementById('btnCam');
            btn.className = isCamOn ? 'ctrl-btn active' : 'ctrl-btn disabled';
        }

        async function toggleScreen() {
            if(!peerConnection) return alert("Сначала начните звонок");
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                if(sender) sender.replaceTrack(videoTrack);
                localVideo.srcObject = screenStream;
                document.getElementById('btnScreen').classList.add('disabled');
                videoTrack.onended = () => {
                    const camTrack = localStream.getVideoTracks()[0];
                    sender.replaceTrack(camTrack);
                    localVideo.srcObject = localStream;
                    document.getElementById('btnScreen').classList.remove('disabled');
                };
            } catch(e) { console.error(e); }
        }

        function copyId() {
            if(!myUserId) return;
            navigator.clipboard.writeText(myUserId);
            const old = myIdDisplay.innerText;
            myIdDisplay.innerText = "Скопировано!";
            setTimeout(() => myIdDisplay.innerText = "ID: " + myUserId, 1500);
        }
    </script>
</body>
</html>
